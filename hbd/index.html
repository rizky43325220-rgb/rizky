<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS tetap sama seperti kode kamu sebelumnya */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; font-family: 'Poppins', sans-serif; overflow-x: hidden; background: linear-gradient(135deg, #ff6b9d 0%, #c44569 25%, #6c5ce7 50%, #a29bfe 75%, #74b9ff 100%); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; overflow: hidden; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('background.jpg') center/cover no-repeat; }
        .confetti { position: absolute; width: 10px; height: 10px; opacity: 0.8; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .balloon { position: absolute; width: 60px; height: 80px; border-radius: 50%; animation: float 6s ease-in-out infinite; }
        .balloon::before { content: ''; position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); width: 2px; height: 30px; background: rgba(255,255,255,0.6); }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-20px) rotate(-2deg); } }
        h1 { font-family: 'Pacifico', cursive; font-size: clamp(2.5rem, 8vw, 5rem); color: #fff; text-shadow: 3px 3px 0 #ff6b9d, 6px 6px 0 #c44569; margin-bottom: 30px; text-align: center; animation: bounce 2s ease-in-out infinite; z-index: 10; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .cake-container { position: relative; margin: 20px 0; z-index: 10; }
        .cake { width: clamp(200px, 50vw, 300px); height: clamp(180px, 40vw, 220px); position: relative; display: flex; flex-direction: column; align-items: center; }
        .cake-top { width: 100%; height: 60px; background: linear-gradient(180deg, #ffeaa7 0%, #fdcb6e 100%); border-radius: 10px 10px 0 0; position: relative; }
        .cake-middle { width: 90%; height: 80px; background: linear-gradient(180deg, #fd79a8 0%, #e84393 100%); position: relative; }
        .cake-bottom { width: 80%; height: 60px; background: linear-gradient(180deg, #a29bfe 0%, #6c5ce7 100%); border-radius: 0 0 10px 10px; }
        .candles { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 5; }
        .candle { width: 12px; height: 40px; background: white; border-radius: 3px; position: relative; }
        .candle::before { content: ''; position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 8px; height: 15px; background: orange; border-radius: 50%; animation: flicker 0.5s infinite alternate; }
        .candle.blown::before { opacity: 0; }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); } 100% { transform: translateX(-50%) scale(1.1); } }
        .blow-btn { margin-top: 30px; padding: 18px 45px; font-size: 1.3rem; font-weight: 600; color: #fff; background: linear-gradient(135deg, #ff6b9d 0%, #f0932b 100%); border: none; border-radius: 50px; cursor: pointer; z-index: 10; }
        .photo-gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 30px 0; max-width: 400px; }
        .photo-frame { background: white; padding: 8px; border-radius: 10px; transform: rotate(var(--rotate, 0deg)); }
        .photo-frame img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        .photo-frame:nth-child(odd) { --rotate: -3deg; }
        .photo-frame:nth-child(even) { --rotate: 3deg; }
        .message { margin-top: 25px; font-size: 1.5rem; color: #fff; opacity: 0; transition: 0.5s; z-index: 10; }
        .message.show { opacity: 1; }
        .star { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="confetti-container"></div>
        <div id="balloons-container"></div>
        <div id="stars-container"></div>

        <h1>🎉 SUGENG AMBAL WARSO NYAIII! 🎂</h1>
        
        <div class="cake-container">
            <div class="cake">
                <div class="candles" id="candles">
                    <div class="candle"></div>
                    <div class="candle"></div>
                    <div class="candle"></div>
                    <div class="candle"></div>
                    <div class="candle"></div>
                </div>
                <div class="cake-top"></div>
                <div class="cake-middle"></div>
                <div class="cake-bottom"></div>
            </div>
        </div>

        <button class="blow-btn" id="blowBtn" onclick="blowCandles()">
            🕯️ Tiup Lilin 
        </button>

        <div class="message" id="message">
            ✨ Sungkem Dulu Sama Yang Nambah TUO 🙏 ✨
        </div>
        
        <div class="photo-gallery">
            <div class="photo-frame"><img src="cewe_bppr.jpeg" alt="1"></div>
            <div class="photo-frame"><img src="ha.jpeg" alt="2"></div>
            <div class="photo-frame"><img src="gigi.jpeg" alt="3"></div>
            <div class="photo-frame"><img src="senyum.jpeg" alt="4"></div>
            <div class="photo-frame"><img src="nunjuk.jpeg" alt="5"></div>
            <div class="photo-frame"><img src="hadehh.jpeg" alt="6"></div>
        </div>
    </div>

    <script>
        // Ambil elemen audio
        const audio = document.getElementById('bgMusic');

        function blowCandles() {
            const candles = document.querySelectorAll('.candle');
            const btn = document.getElementById('blowBtn');
            const message = document.getElementById('message');
            
            // --- BAGIAN MUSIK ---
            // Saat tombol diklik, musik akan mulai berputar
            audio.play().catch(error => {
                console.log("Autoplay dicegah browser, tapi klik ini harusnya berhasil menyalakan musik.");
            });
            
            if (!candlesBlown) {
                candles.forEach((candle, index) => {
                    setTimeout(() => {
                        candle.classList.add('blown');
                    }, index * 100);
                });
                
                btn.textContent = '🎊 Dari Kami BPPR 🎊';
                btn.style.background = 'linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%)';
                candlesBlown = true;
                
                setTimeout(() => {
                    message.classList.add('show');
                }, 500);
            } else {
                candles.forEach(candle => candle.classList.remove('blown'));
                btn.textContent = '🕯️ Tiup Lilin';
                btn.style.background = 'linear-gradient(135deg, #ff6b9d 0%, #f0932b 100%)';
                message.classList.remove('show');
                candlesBlown = false;
            }
        }

        // Fungsi dekorasi lainnya
        let candlesBlown = false;
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#ff6b9d', '#ffd32a', '#6c5ce7', '#00cec9'];
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDuration = (Math.random() * 3 + 3) + 's';
                c.style.top = "-10px";
                container.appendChild(c);
            }
        }

        function createBalloons() {
            const container = document.getElementById('balloons-container');
            const colors = ['#ff6b9d', '#74b9ff', '#ffd32a'];
            for (let i = 0; i < 8; i++) {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = (Math.random() * 90) + 'vw';
                b.style.bottom = "-100px";
                b.style.background = colors[i % colors.length];
                b.style.animation = `float ${Math.random() * 3 + 4}s ease-in infinite`;
                container.appendChild(b);
            }
        }

        function createStars() {
            const container = document.getElementById('stars-container');
            for (let i = 0; i < 30; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                container.appendChild(s);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            createConfetti();
            createBalloons();
            createStars();
        });
    </script>
</body>
</html>
